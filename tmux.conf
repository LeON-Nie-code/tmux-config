# ==========================================
# 1. TPM plugin list
# ==========================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Auto-save and restore sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Tools and appearance
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'schasse/tmux-jump'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Catppuccin theme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'

# tmux-yank is intentionally not used to avoid taking over mouse release events.

# ==========================================
# 2. Core custom config
# ==========================================
# Enable Continuum auto-restore
set -g @tmux-continuum-restore 'on'
set -g @tmux-resurrect-processes 'ssh psql mysql sqlite3'

# Keep mouse selection scoped to panes.
set -g mouse on

# Clipboard passthrough.
set -s set-clipboard on
set -g allow-passthrough on

# Copy mouse selections to the system clipboard on macOS and Linux.
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "$HOME/.tmux/bin/tmux-copy"
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "$HOME/.tmux/bin/tmux-copy"

# ==========================================
# 3. Initialize plugin manager; keep this at the bottom.
# ==========================================
run '~/.tmux/plugins/tpm/tpm'
